name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      # choose your default branch
      - master
      - main
    paths-ignore:
      - '*.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Plugins
        run: |
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Prepare builds branch
        run: |
          mkdir -p "$GITHUB_WORKSPACE/builds"
          cd "$GITHUB_WORKSPACE/builds"
          git init
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          if git fetch --depth=1 origin builds; then
            git checkout -B builds FETCH_HEAD
          else
            git checkout --orphan builds
            git rm -rf . >/dev/null 2>&1 || true
          fi
          find . -maxdepth 1 -name "*.cs3" -delete

      - name: Copy build artifacts
        run: |
          find "$GITHUB_WORKSPACE/src" -path "*/build/*.cs3" -type f -exec cp {} "$GITHUB_WORKSPACE/builds/" \;
          cp "$GITHUB_WORKSPACE/src/build/plugins.json" "$GITHUB_WORKSPACE/builds/"
          cp "$GITHUB_WORKSPACE/src/kat.json" "$GITHUB_WORKSPACE/builds/"

      - name: Push builds
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          if git diff --cached --quiet; then
            echo "No build changes to commit."
            exit 0
          fi
          git commit -m "Build $GITHUB_SHA"
          git push origin builds
